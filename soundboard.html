<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Soundboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .soundboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .sound-button {
            height: 120px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-color: white;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .sound-button:hover {
            background-color: #e6f7ff;
            border-color: #1890ff;
        }
        .sound-button.has-sound {
            border-style: solid;
            background-color: #f0f8ff;
        }
        .sound-button audio {
            display: none;
        }
        .button-controls {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        .control-btn {
            padding: 2px 6px;
            font-size: 10px;
            cursor: pointer;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 3px;
        }
        .control-btn.delete {
            background: #ff4d4f;
        }
        .volume-slider {
            width: 80%;
            margin: 5px 0;
            display: none;
        }
        .button-label {
            text-align: center;
            padding: 5px;
            width: 100%;
            word-break: break-word;
            font-size: 12px;
        }
        .upload-area {
            margin-bottom: 20px;
            padding: 20px;
            border: 2px dashed #1890ff;
            border-radius: 8px;
            text-align: center;
            background-color: #e6f7ff;
        }
        .instructions {
            margin-bottom: 10px;
            color: #555;
        }
        .keyboard-shortcuts {
            margin-top: 20px;
            padding: 10px;
            background-color: #fffbe6;
            border-radius: 4px;
            font-size: 14px;
        }
        .shortcut-key {
            display: inline-block;
            padding: 2px 6px;
            background: #f0f0f0;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-weight: bold;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <h1>Enhanced Soundboard</h1>
    
    <div class="upload-area">
        <div class="instructions">Click a button below to assign a sound, then click the button to play</div>
        <input type="file" id="soundUpload" accept="audio/*" style="display: none;">
    </div>
    
    <div class="soundboard" id="soundboard">
        <!-- Sound buttons will be generated here -->
    </div>
    
    <div class="keyboard-shortcuts">
        <strong>Keyboard Shortcuts:</strong>
        <div>Keys <span class="shortcut-key">1</span> to <span class="shortcut-key">9</span> for buttons 1-9</div>
        <div>Keys <span class="shortcut-key">Q</span>, <span class="shortcut-key">W</span>, <span class="shortcut-key">E</span> for buttons 10-12</div>
        <div><span class="shortcut-key">Delete</span> or <span class="shortcut-key">Backspace</span> to remove sound from selected button</div>
    </div>

    <script>
        let selectedButton = null;
        const soundboard = document.getElementById('soundboard');
        const soundUpload = document.getElementById('soundUpload');
        const buttons = [];
        
        // Create 12 sound buttons
        for (let i = 1; i <= 12; i++) {
            const button = document.createElement('div');
            button.className = 'sound-button';
            button.dataset.index = i;
            button.innerHTML = `
                <div class="button-label">Button ${i}</div>
                <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="1">
                <div class="button-controls">
                    <button class="control-btn delete" title="Delete sound">✕</button>
                </div>
                <audio></audio>
            `;
            
            const audio = button.querySelector('audio');
            const volumeSlider = button.querySelector('.volume-slider');
            const deleteBtn = button.querySelector('.delete');
            
            // Play sound on button click
            button.addEventListener('click', (e) => {
                if (e.target === deleteBtn) return;
                
                // Highlight selected button
                document.querySelectorAll('.sound-button').forEach(btn => {
                    btn.style.boxShadow = btn === button ? '0 0 0 2px #1890ff' : '';
                });
                selectedButton = button;
                
                if (audio.src) {
                    // Play sound if already assigned
                    audio.currentTime = 0;
                    audio.volume = parseFloat(volumeSlider.value);
                    audio.play();
                } else {
                    // Select button for sound assignment
                    soundUpload.click();
                }
            });
            
            // Volume control
            volumeSlider.addEventListener('input', () => {
                audio.volume = parseFloat(volumeSlider.value);
            });
            
            // Toggle volume slider visibility
            button.addEventListener('mouseenter', () => {
                if (audio.src) {
                    volumeSlider.style.display = 'block';
                }
            });
            
            button.addEventListener('mouseleave', () => {
                volumeSlider.style.display = 'none';
            });
            
            // Delete sound
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                audio.src = '';
                button.querySelector('.button-label').textContent = `Button ${i}`;
                button.classList.remove('has-sound');
                volumeSlider.value = 1;
            });
            
            soundboard.appendChild(button);
            buttons.push(button);
        }
        
        // Handle sound file upload
        soundUpload.addEventListener('change', (e) => {
            if (!selectedButton || !e.target.files.length) return;
            
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            const audio = selectedButton.querySelector('audio');
            const label = selectedButton.querySelector('.button-label');
            
            audio.src = url;
            label.textContent = file.name.substring(0, 20) + (file.name.length > 20 ? '...' : '');
            selectedButton.classList.add('has-sound');
            
            // Reset selection
            selectedButton.style.boxShadow = '';
            selectedButton = null;
            soundUpload.value = '';
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Number keys 1-9 for buttons 1-9
            if (e.key >= '1' && e.key <= '9') {
                const index = parseInt(e.key) - 1;
                if (buttons[index]) {
                    buttons[index].click();
                }
                return;
            }
            
            // Q, W, E for buttons 10, 11, 12
            if (e.key === 'q' || e.key === 'Q') {
                if (buttons[9]) buttons[9].click();
                return;
            }
            if (e.key === 'w' || e.key === 'W') {
                if (buttons[10]) buttons[10].click();
                return;
            }
            if (e.key === 'e' || e.key === 'E') {
                if (buttons[11]) buttons[11].click();
                return;
            }
            
            // Delete/Backspace to remove sound from selected button
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedButton) {
                const audio = selectedButton.querySelector('audio');
                const label = selectedButton.querySelector('.button-label');
                const index = parseInt(selectedButton.dataset.index);
                
                audio.src = '';
                label.textContent = `Button ${index}`;
                selectedButton.classList.remove('has-sound');
                selectedButton.querySelector('.volume-slider').value = 1;
                return;
            }
        });
    </script>
</body>
</html>
